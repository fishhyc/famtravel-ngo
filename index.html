    <!-- 3. 安卓強制讀取圖示的終極武器 (動態生成 Manifest 絕對路徑) -->
    <link rel="manifest" id="dynamic-manifest">
    <script>
        (function() {
            try {
                // 取得目前網頁的絕對路徑
                var baseUrl = window.location.href.split('#')[0];
                
                // 如果在預覽環境 (blob:, data:, about:) 中執行，則跳過以避免 URL 解析錯誤
                if (baseUrl.startsWith('blob:') || baseUrl.startsWith('data:') || baseUrl.startsWith('about:')) {
                    return;
                }
                
                var iconUrl = new URL('icon.png?v=4', baseUrl).href;
                
                // 動態建立 Android PWA 清單
                var manifest = {
                    "name": "日本中部家庭旅遊",
                    "short_name": "日本旅遊",
                    "display": "standalone",
                    "start_url": baseUrl,
                    "background_color": "#F7F4F2",
                    "theme_color": "#B86F72",
                    "icons": [
                        { "src": iconUrl, "sizes": "192x192", "type": "image/png", "purpose": "any maskable" },
                        { "src": iconUrl, "sizes": "512x512", "type": "image/png", "purpose": "any maskable" }
                    ]
                };
                
                // 轉換成 Blob URL 餵給瀏覽器
                var blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
                var manifestElement = document.getElementById('dynamic-manifest');
                if (manifestElement) {
                    manifestElement.href = URL.createObjectURL(blob);
                }
            } catch (error) {
                console.warn("Manifest generation skipped due to environment limitations:", error);
            }
        })();
    </script>

                }).join('\n');
                helperText.innerHTML = "💡 <b>航班格式：</b><br>去/回程：<code>標籤 | 日期 | 航班號 | 起飛時間 | 起飛地 | 降落時間 | 目的地</code><br>備註區：<code>備註 | 內容</code>";
                helperText.classList.remove('hidden');

                content = tripData[dayIndex][field].map(item => {

                    if (item.type || item.note || item.img) parts.push(item.type || '');
                    if (item.note || item.img) parts.push(item.note || '');
                    if (item.img) parts.push(item.img || '');
                    while(parts.length > 2 && parts[parts.length-1] === '') parts.pop();
                    return parts.join(' | ');
                }).join('\n');
                
                helperText.innerHTML = "💡 <b>時間軸格式：</b><code>時間 | 內容 | 標籤 | 備註 | 圖片網址</code><br>（順序隨意，系統會自動抓出網址！想變小字請加 <code>minor</code>）";
                helperText.classList.remove('hidden');
            } else if (field === 'rooms') {
                if (!tripData[dayIndex].rooms) tripData[dayIndex].rooms = [];
                content = tripData[dayIndex].rooms.map(room => {
                    let parts = [room.guest, room.type];

                helperText.innerHTML = "💡 <b>房型格式：</b><code>入住者 | 房型 | 圖片網址</code><br>⚠️ 請對著圖片按右鍵選「<b>複製圖片位址</b>」(不能是網頁連結喔)";

        window.saveEdit = function() {
            if (currentEditTarget) {
                const targetDayIndex = currentEditTarget.dayIndex;
                const targetField = currentEditTarget.field;
                const rawValue = document.getElementById('edit-textarea').value;
                
                if (targetField === 'mapLink') {
                    cloudMapLink = rawValue.trim();
                    saveToCloud();
                    window.closeEditModal();
                    window.renderHome();
                    window.showToast("寶藏地圖連結已更新！");
                    return;
                } else if (targetField === 'flight') {
                    const lines = rawValue.split('\n').filter(line => line.trim() !== '');
                    cloudFlight = lines.map(line => {
                        const parts = line.split('|').map(p => p.trim());
                        if (parts[0] === '備註') return { type: 'note', text: parts[1] || '' };
                        return { type: parts[0] === '回程' ? 'inbound' : 'outbound', label: parts[0] || '', date: parts[1] || '', flight: parts[2] || '', t1: parts[3] || '', p1: parts[4] || '', t2: parts[5] || '', p2: parts[6] || '' };
                    });
                    saveToCloud();
                    window.closeEditModal();
                    window.renderHome();
                    window.showToast("航班資訊已更新！");
                    return;
                }

                if (targetField === 'schedule') {
                    const lines = rawValue.split('\n').filter(line => line.trim() !== '');
                    const newSchedule = lines.map(line => {
                        const parts = line.split('|').map(p => p.trim());
                        const obj = { time: parts[0] || '', event: parts[1] || '' };
                        for (let i = 2; i < parts.length; i++) {
                            const p = parts[i];
                            if (p.startsWith('http') || p.startsWith('data:')) {
                                obj.img = p;
                            } else if (p.toLowerCase() === 'minor') {
                                obj.type = 'minor';
                            } else if (p !== '') {
                                obj.note = obj.note ? obj.note + ' ' + p : p;
                            }
                        }
                        return obj;
                    });
                    tripData[targetDayIndex][targetField] = newSchedule;
                } else if (targetField === 'rooms') {
                    const lines = rawValue.split('\n').filter(line => line.trim() !== '');
                    tripData[targetDayIndex].rooms = lines.map(line => {
                        const parts = line.split('|').map(p => p.trim());
                        const obj = { guest: parts[0] || '', type: parts[1] || '' };
                        for (let i = 2; i < parts.length; i++) {
                            if (parts[i].startsWith('http') || parts[i].startsWith('data:')) obj.img = parts[i];
                            else obj.type += ' ' + parts[i];
                        }
                        return obj;
                    });
                } else if (targetField === 'dining') {
                    const lines = rawValue.split('\n').filter(line => line.trim() !== '');
                    tripData[targetDayIndex].dining = lines.map(line => {
                        const parts = line.split('|').map(p => p.trim());
                        const obj = { meal: parts[0] || '', name: parts[1] || '' };
                        for (let i = 2; i < parts.length; i++) {
                            if (parts[i].startsWith('http') || parts[i].startsWith('data:')) obj.img = parts[i];
                            else obj.name += ' ' + parts[i];
                        }
                        return obj;
                    });
                } else {
                    tripData[targetDayIndex][targetField] = rawValue;
                }
                
                saveToCloud();
                window.closeEditModal();
                window.renderDetail(targetDayIndex);
            }
        };

                        ${(day.dining && day.dining.length > 0 || isAdmin) ? `

                            <div class="flex justify-between items-center mb-3">
                                <h3 class="text-md font-bold text-morandi-red flex items-center">
                                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z"></path></svg>
                                    餐飲資訊
                                </h3>
                                ${isAdmin ? `<button onclick="editField(${index}, 'dining', '餐飲資訊')" class="text-morandi-text-light hover:text-morandi-red bg-morandi-bg p-1.5 rounded-md transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>` : ''}

                                    <div class="h-24 w-full relative cursor-pointer group bg-morandi-bg/30" onclick="openImageModal('${d.img}')">

                                        <div class="absolute inset-0 bg-black/10 group-hover:bg-black/0 transition-colors duration-300"></div>
                                        <div class="absolute bottom-1.5 right-1.5 bg-black/40 rounded-full p-1 backdrop-blur-sm">
                                            <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                                        </div>
                                    </div>

                                        <svg class="w-5 h-5 text-morandi-red-light mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>

                                    </div>
                                    `}

                                        <div class="text-[10.5px] leading-tight line-clamp-2">
                                            <span class="font-bold text-morandi-red-dark mr-1">${d.meal}</span><span class="text-morandi-text">${d.name}</span>
                                        </div>
                                    </div>
                                </div>

                            <div class="flex justify-between items-center mb-2">

                                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 001 1m-6 0h6"></path></svg>

                                        <div class="bg-white/80 rounded-xl border border-morandi-red-light/30 overflow-hidden shadow-sm flex flex-col">
                                            <div class="h-24 w-full relative cursor-pointer group bg-morandi-bg/30" onclick="openImageModal('${room.img}')">
                                                <img src="${room.img}" onerror="this.onerror=null; this.src='https://placehold.co/600x400/E8D5D6/8C4F52?text=圖片載入失敗'" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" alt="房型照片">

                                                </div>
                                            </div>
                                            <div class="p-2 flex flex-col items-center text-center">
                                                <span class="font-bold text-morandi-red-dark text-[11px] mb-0.5">${room.guest}</span>
                                                <span class="text-morandi-text text-[10px] leading-tight line-clamp-1">${room.type}</span>
                                            </div>
                                        </div>
                                    `).join('') + `</div>` : '<div class="text-xs text-morandi-text-light py-1 text-left">點擊右上角按鈕新增房型資訊</div>'}
                                </div>
                            </div>
                        </div>

                        <div class="bg-morandi-card rounded-2xl p-4.5 shadow-soft border border-morandi-red-light/40 p-4 relative group text-left">
                            <div class="flex justify-between items-center mb-2">
                                <h3 class="text-md font-bold text-morandi-red flex items-center">
                                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    其他資訊
                                </h3>
                                ${isAdmin ? `<button onclick="editField(${index}, 'otherInfo', '其他資訊')" class="text-morandi-text-light hover:text-morandi-red bg-morandi-bg p-1.5 rounded-md transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>` : ''}
                            </div>
                            <div class="text-sm text-morandi-text bg-morandi-bg p-3 rounded-xl leading-relaxed whitespace-pre-wrap text-left block w-full">${otherInfoHtml}</div>
                        </div>
                    </div>
                </div>
            `;
            
            app.scrollTop = 0;
        };

        window.onload = () => {
            window.renderHome();
        };
    </script>
</body>
</html>
